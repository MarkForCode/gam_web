
services:
  user-web:
    build:
      context: .
      target: nginx-user-web
    container_name: gam_user_web
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cms:
    build:
      context: .
      target: nginx-cms
    container_name: gam_cms
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
